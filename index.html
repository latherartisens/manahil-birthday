<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Manahil 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .slideshow-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            position: relative;
            perspective: 1000px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateX(100%) rotateY(90deg);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: center;
            padding: 40px;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0) rotateY(0deg);
        }

        .slide.prev {
            transform: translateX(-100%) rotateY(-90deg);
            opacity: 0;
        }

        .slide h1 {
            font-size: 4rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 3s ease-in-out infinite alternate;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
        }

        .slide h2 {
            font-size: 3rem;
            color: #333;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes textGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* Photo Slider */
        .photo-slider {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .photo-slider::-webkit-scrollbar {
            display: none;
        }

        .photo-frame {
            width: 250px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            scroll-snap-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .photo-frame:hover {
            transform: scale(1.05);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-buttons {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .slide h1 { font-size: 2.5rem; }
            .slide h2 { font-size: 2rem; }
            .photo-frame { width: 200px; height: 250px; }
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <!-- Slide 1 -->
        <div class="slide active">
            <h1>Hi Manahil Bby 💕</h1>
        </div>

        <!-- Slide 2 -->
        <div class="slide">
            <h2>Happy Birthday! 🎂✨</h2>
            <h1>19 Today! 🥳</h1>
        </div>

        <!-- Slide 3 -->
        <div class="slide">
            <h1>I Really Love You</h1>
            <h2>My Cute Bby 😍💖</h2>
        </div>

        <!-- Slide 4 - Photo Slider -->
        <div class="slide">
            <h2>Our Beautiful Memories 📸</h2>
            <div class="photo-slider">
                <!-- ADD YOUR PHOTOS HERE - Replace src with your image URLs -->
                <div class="photo-frame">
                    <img src=""C:\Users\LAPTOPS HUB\Downloads\IMG_2850 (1).jpeg"" alt="Photo 1">
                </div>
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=500&fit=crop" alt="Photo 2">
                </div>
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=400&h=500&fit=crop" alt="Photo 3">
                </div>
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1524504388940-b6b749e7148d?w=400&h=500&fit=crop" alt="Photo 4">
                </div>
                <!-- Add more photos by copying the photo-frame div -->
            </div>
        </div>

        <!-- Slide 5 -->
        <div class="slide">
            <h1>Goodbye Bby 👋💕</h1>
            <h2>Love You Forever! ❤️</h2>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">←</button>
            <button class="nav-btn" id="nextBtn">→</button>
        </div>
    </div>

    <div class="hearts" id="hearts"></div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const heartsContainer = document.getElementById('hearts');
        let currentSlide = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active', 'prev');
                if (i === index) {
                    slide.classList.add('active');
                } else if (i === (index - 1 + slides.length) % slides.length) {
                    slide.classList.add('prev');
                }
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(currentSlide);
        }

        // Auto slide every 4 seconds
        setInterval(nextSlide, 4000);

        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);

        // Floating hearts animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Create hearts continuously
        setInterval(createHeart, 500);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
    </script>
</body>
</html>
